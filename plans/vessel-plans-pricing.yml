specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Vessel
providerId: vessel
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Unified API
  - Integrations
  - CRM
  - HRIS
  - SaaS
description: Vessel offers a unified API for SaaS integrations. The public pricing page lists three
  tiers - Start (free, 5 development connections), Launch (custom-priced, up to 20 connections),
  and Custom (custom-priced, unlimited connections, whitelabeling). All tiers advertise unlimited
  API calls; commercial pricing for Launch and Custom is negotiated directly.
sources:
  - https://www.vessel.dev/pricing
plans:
  - id: vessel-start
    name: Start
    type: freemium
    description: Free development tier with 5 connections; intended for evaluation and prototyping.
    entries:
      - label: Plan price
        name: plan_price
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: Development connections
        name: dev_connections
        type: quota
        metric: connection
        limit: 5
        timeFrame: usage
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
      - label: API calls
        name: api_calls
        type: quota
        metric: request
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '$0'
        userMultiplied: false
    elements:
      - name: Unified APIs
      - name: Action APIs
      - name: Unlimited API calls
  - id: vessel-launch
    name: Launch
    type: subscription
    description: Production tier with up to 20 connections, custom-priced for the customer's business.
    entries:
      - label: Plan price
        name: plan_price
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: customized for your business
        userMultiplied: false
      - label: Maximum connections
        name: max_connections
        type: quota
        metric: connection
        limit: 20
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
      - label: API calls
        name: api_calls
        type: quota
        metric: request
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Unified APIs
      - name: Action APIs
      - name: Email support
      - name: Unlimited API calls
  - id: vessel-custom
    name: Custom
    type: enterprise
    description: Custom-priced tier with unlimited connections, whitelabeling, and Slack support.
    entries:
      - label: Plan price
        name: plan_price
        type: subscription
        metric: month
        limit: 1
        timeFrame: month
        geo: global
        unit: 1
        price: customized for your business
        userMultiplied: false
      - label: Connections
        name: connections
        type: quota
        metric: connection
        limit: -1
        timeFrame: usage
        geo: global
        unit: 1
        price: included
        userMultiplied: false
    elements:
      - name: Whitelabeling
      - name: Unified APIs
      - name: Action APIs
      - name: Slack support
      - name: Prioritized feature requests and integrations
