naftiko: 1.0.0-alpha2
info:
  label: Vessel CRM API — Accounts
  description: 'Vessel CRM API — Accounts. 2 operations. Lead operation: Get All Accounts. Self-contained Naftiko capability
    covering one Vessel business surface.'
  tags:
  - Vessel
  - Accounts
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VESSEL_API_KEY: VESSEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: crm-accounts
    baseUri: https://api.vessel.land
    description: Vessel CRM API — Accounts business capability. Self-contained, no shared references.
    resources:
    - name: crm-accounts
      path: /crm/accounts
      operations:
      - name: getallaccounts
        method: GET
        description: Get All Accounts
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accessToken
          in: query
          type: string
          required: true
        - name: cursor
          in: query
          type: string
    - name: crm-accounts-create
      path: /crm/accounts/create
      operations:
      - name: createaccount
        method: POST
        description: Create an Account
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accessToken
          in: query
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: vessel-api-token
      value: '{{env.VESSEL_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: crm-accounts-rest
    port: 8080
    description: REST adapter for Vessel CRM API — Accounts. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/crm/accounts
      name: crm-accounts
      description: REST surface for crm-accounts.
      operations:
      - method: GET
        name: getallaccounts
        description: Get All Accounts
        call: crm-accounts.getallaccounts
        with:
          accessToken: rest.accessToken
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/accounts/create
      name: crm-accounts-create
      description: REST surface for crm-accounts-create.
      operations:
      - method: POST
        name: createaccount
        description: Create an Account
        call: crm-accounts.createaccount
        with:
          accessToken: rest.accessToken
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: crm-accounts-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vessel CRM API — Accounts. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-accounts
      description: Get All Accounts
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-accounts.getallaccounts
      with:
        accessToken: tools.accessToken
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: create-account
      description: Create an Account
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: crm-accounts.createaccount
      with:
        accessToken: tools.accessToken
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
