naftiko: "1.0.0-alpha1"

info:
  label: "Vessel CRM API"
  description: >-
    Vessel CRM API providing unified access to contacts, deals, accounts,
    leads, notes, tasks, and users across Salesforce, HubSpot, Zoho,
    Pipedrive, Close, Freshsales, Microsoft Dynamics, and more.
  tags:
    - Accounts
    - CRM
    - Contacts
    - Deals
    - Embedded Integrations
    - Leads
    - Notes
    - Tasks
    - Unified API
    - Vessel
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      VESSEL_API_TOKEN: VESSEL_API_TOKEN
      VESSEL_ACCESS_TOKEN: VESSEL_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: vessel-crm
      baseUri: "https://api.vessel.land"
      description: "Vessel CRM API for unified CRM operations"
      authentication:
        type: apikey
        key: vessel-api-token
        value: "{{env.VESSEL_API_TOKEN}}"
        placement: header
      resources:
        - name: contacts
          path: /crm/contacts
          description: "CRM contacts"
          operations:
            - name: get-all-contacts
              method: GET
              description: "Get All Contacts"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
                  description: "User connection access token"
                - name: cursor
                  in: query
                  type: string
                  required: false
                  description: "Pagination cursor"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-contact
              method: POST
              description: "Create a Contact"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
                  description: "User connection access token"
              body:
                type: json
                data:
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  email: "{{tools.email}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: deals
          path: /crm/deals
          description: "CRM deals"
          operations:
            - name: get-all-deals
              method: GET
              description: "Get All Deals"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
                - name: cursor
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-deal
              method: POST
              description: "Create a Deal"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  amount: "{{tools.amount}}"
                  stage: "{{tools.stage}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: accounts
          path: /crm/accounts
          description: "CRM accounts"
          operations:
            - name: get-all-accounts
              method: GET
              description: "Get All Accounts"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
                - name: cursor
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-account
              method: POST
              description: "Create an Account"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  domain: "{{tools.domain}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: leads
          path: /crm/leads
          description: "CRM leads"
          operations:
            - name: get-all-leads
              method: GET
              description: "Get All Leads"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: notes
          path: /crm/notes
          description: "CRM notes"
          operations:
            - name: get-all-notes
              method: GET
              description: "Get All Notes"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-note
              method: POST
              description: "Create a Note"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
              body:
                type: json
                data:
                  content: "{{tools.content}}"
                  contactId: "{{tools.contactId}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: tasks
          path: /crm/tasks
          description: "CRM tasks"
          operations:
            - name: get-all-tasks
              method: GET
              description: "Get All Tasks"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: users
          path: /crm/users
          description: "CRM users"
          operations:
            - name: get-all-users
              method: GET
              description: "Get All Users"
              inputParameters:
                - name: accessToken
                  in: query
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8101
      namespace: vessel-crm-rest
      resources:
        - path: /v1/contacts
          name: contacts
          description: "Unified CRM contacts"
          operations:
            - method: GET
              name: get-all-contacts
              description: "Get All Contacts"
            - method: POST
              name: create-contact
              description: "Create a Contact"
        - path: /v1/deals
          name: deals
          description: "Unified CRM deals"
          operations:
            - method: GET
              name: get-all-deals
              description: "Get All Deals"
        - path: /v1/accounts
          name: accounts
          description: "Unified CRM accounts"
          operations:
            - method: GET
              name: get-all-accounts
              description: "Get All Accounts"

    - type: mcp
      port: 9101
      namespace: vessel-crm-mcp
      transport: http
      tools:
        - name: get-all-contacts
          description: "List all CRM contacts from the connected CRM system"
          hints:
            readOnly: true
            openWorld: true
        - name: create-contact
          description: "Create a new contact in the connected CRM"
          hints:
            readOnly: false
            openWorld: false
        - name: get-all-deals
          description: "List all deals/opportunities from the connected CRM"
          hints:
            readOnly: true
            openWorld: true
        - name: create-deal
          description: "Create a new deal in the connected CRM"
          hints:
            readOnly: false
            openWorld: false
        - name: get-all-accounts
          description: "List all company accounts from the connected CRM"
          hints:
            readOnly: true
            openWorld: true
