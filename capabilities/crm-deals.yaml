naftiko: 1.0.0-alpha2
info:
  label: Vessel CRM API — Deals
  description: 'Vessel CRM API — Deals. 3 operations. Lead operation: Get All Deals. Self-contained Naftiko capability covering
    one Vessel business surface.'
  tags:
  - Vessel
  - Deals
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VESSEL_API_KEY: VESSEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: crm-deals
    baseUri: https://api.vessel.land
    description: Vessel CRM API — Deals business capability. Self-contained, no shared references.
    resources:
    - name: crm-deals
      path: /crm/deals
      operations:
      - name: getalldeals
        method: GET
        description: Get All Deals
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accessToken
          in: query
          type: string
          required: true
        - name: cursor
          in: query
          type: string
    - name: crm-deals-create
      path: /crm/deals/create
      operations:
      - name: createdeal
        method: POST
        description: Create a Deal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accessToken
          in: query
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: crm-deals-update
      path: /crm/deals/update
      operations:
      - name: updatedeal
        method: POST
        description: Update a Deal
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accessToken
          in: query
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: vessel-api-token
      value: '{{env.VESSEL_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: crm-deals-rest
    port: 8080
    description: REST adapter for Vessel CRM API — Deals. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/crm/deals
      name: crm-deals
      description: REST surface for crm-deals.
      operations:
      - method: GET
        name: getalldeals
        description: Get All Deals
        call: crm-deals.getalldeals
        with:
          accessToken: rest.accessToken
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/deals/create
      name: crm-deals-create
      description: REST surface for crm-deals-create.
      operations:
      - method: POST
        name: createdeal
        description: Create a Deal
        call: crm-deals.createdeal
        with:
          accessToken: rest.accessToken
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/deals/update
      name: crm-deals-update
      description: REST surface for crm-deals-update.
      operations:
      - method: POST
        name: updatedeal
        description: Update a Deal
        call: crm-deals.updatedeal
        with:
          accessToken: rest.accessToken
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: crm-deals-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vessel CRM API — Deals. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-deals
      description: Get All Deals
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-deals.getalldeals
      with:
        accessToken: tools.accessToken
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: create-deal
      description: Create a Deal
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: crm-deals.createdeal
      with:
        accessToken: tools.accessToken
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: update-deal
      description: Update a Deal
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: crm-deals.updatedeal
      with:
        accessToken: tools.accessToken
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
