naftiko: 1.0.0-alpha2
info:
  label: Vessel Platform API — Webhooks
  description: 'Vessel Platform API — Webhooks. 3 operations. Lead operation: Create a Webhook. Self-contained Naftiko capability
    covering one Vessel business surface.'
  tags:
  - Vessel
  - Webhooks
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VESSEL_API_KEY: VESSEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: platform-webhooks
    baseUri: https://api.vessel.dev
    description: Vessel Platform API — Webhooks business capability. Self-contained, no shared references.
    resources:
    - name: webhooks
      path: /webhooks
      operations:
      - name: createwebhook
        method: POST
        description: Create a Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: webhooks-delete
      path: /webhooks/delete
      operations:
      - name: deletewebhook
        method: POST
        description: Delete a Webhook
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: webhooks-list
      path: /webhooks/list
      operations:
      - name: listwebhooks
        method: POST
        description: List All Webhooks
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: apikey
      key: x-vessel-api-token
      value: '{{env.VESSEL_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: platform-webhooks-rest
    port: 8080
    description: REST adapter for Vessel Platform API — Webhooks. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/webhooks
      name: webhooks
      description: REST surface for webhooks.
      operations:
      - method: POST
        name: createwebhook
        description: Create a Webhook
        call: platform-webhooks.createwebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/delete
      name: webhooks-delete
      description: REST surface for webhooks-delete.
      operations:
      - method: POST
        name: deletewebhook
        description: Delete a Webhook
        call: platform-webhooks.deletewebhook
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/webhooks/list
      name: webhooks-list
      description: REST surface for webhooks-list.
      operations:
      - method: POST
        name: listwebhooks
        description: List All Webhooks
        call: platform-webhooks.listwebhooks
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: platform-webhooks-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vessel Platform API — Webhooks. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: create-webhook
      description: Create a Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-webhooks.createwebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-webhook
      description: Delete a Webhook
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: platform-webhooks.deletewebhook
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: list-all-webhooks
      description: List All Webhooks
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: platform-webhooks.listwebhooks
      outputParameters:
      - type: object
        mapping: $.
