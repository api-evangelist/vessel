naftiko: 1.0.0-alpha2
info:
  label: Vessel CRM API — Leads
  description: 'Vessel CRM API — Leads. 2 operations. Lead operation: Get All Leads. Self-contained Naftiko capability covering
    one Vessel business surface.'
  tags:
  - Vessel
  - Leads
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    VESSEL_API_KEY: VESSEL_API_KEY
capability:
  consumes:
  - type: http
    namespace: crm-leads
    baseUri: https://api.vessel.land
    description: Vessel CRM API — Leads business capability. Self-contained, no shared references.
    resources:
    - name: crm-leads
      path: /crm/leads
      operations:
      - name: getallleads
        method: GET
        description: Get All Leads
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accessToken
          in: query
          type: string
          required: true
        - name: cursor
          in: query
          type: string
    - name: crm-leads-create
      path: /crm/leads/create
      operations:
      - name: createlead
        method: POST
        description: Create a Lead
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: accessToken
          in: query
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: apikey
      key: vessel-api-token
      value: '{{env.VESSEL_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: crm-leads-rest
    port: 8080
    description: REST adapter for Vessel CRM API — Leads. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/crm/leads
      name: crm-leads
      description: REST surface for crm-leads.
      operations:
      - method: GET
        name: getallleads
        description: Get All Leads
        call: crm-leads.getallleads
        with:
          accessToken: rest.accessToken
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/crm/leads/create
      name: crm-leads-create
      description: REST surface for crm-leads-create.
      operations:
      - method: POST
        name: createlead
        description: Create a Lead
        call: crm-leads.createlead
        with:
          accessToken: rest.accessToken
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: crm-leads-mcp
    port: 9090
    transport: http
    description: MCP adapter for Vessel CRM API — Leads. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: get-all-leads
      description: Get All Leads
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: crm-leads.getallleads
      with:
        accessToken: tools.accessToken
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
    - name: create-lead
      description: Create a Lead
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: crm-leads.createlead
      with:
        accessToken: tools.accessToken
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
