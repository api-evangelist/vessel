specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Vessel
providerId: vessel
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Unified API
  - Integrations
description: Vessel's public pricing page advertises unlimited API calls across all tiers, but does
  not publish concrete per-second / per-minute throttling thresholds. Underlying integration calls
  are subject to the destination SaaS providers' own rate limits.
sources:
  - https://www.vessel.dev/pricing
responseCodes:
  throttled: 429
limits:
  - name: Vessel-side request rate
    scope: account
    metric: varies
    limit: not publicly documented (advertised as unlimited)
  - name: Downstream provider limits
    scope: integration
    metric: varies
    limit: governed by the destination SaaS API (Salesforce, HubSpot, BambooHR, etc.)
    notes: Even when Vessel does not throttle, the connected provider will; clients should treat
      429s and provider-specific error codes as sourced from the downstream system.
policies:
  - name: Downstream pass-through
    description: Errors and rate-limit signals from the underlying SaaS API are surfaced through
      Vessel's response; respect the provider's documented limits.
  - name: Backoff
    description: On 429 responses, implement exponential backoff with jitter and honor any
      Retry-After header.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
