description: Vessel bills on a connection-tier subscription model (Start, Launch, Custom) rather
  than per API call. Cost scales with the number of customer SaaS integrations active, not request
  volume; Launch and Custom are quoted directly.
sources:
  - https://www.vessel.dev/pricing
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Vessel Unified API
  ServiceCategory: Integration Platform
  ProviderName: Vessel
  PublisherName: Vessel
  InvoiceIssuerName: Vessel
  BillingCurrency: USD
  ChargeCategory: Purchase
meters:
  - name: connections_active
    unit: connection
    aggregation: max
    dimensions:
      - environment
      - integration_provider
  - name: plan_subscription
    unit: month
    aggregation: max
    dimensions:
      - plan_tier
principles:
  - name: Visibility
    description: Track active connections in the Vessel dashboard against the plan ceiling (5 / 20
      / unlimited); since billing is plan-tier based, dashboard connection count is the leading
      cost indicator.
  - name: Allocation
    description: Tag each Vessel connection with the consuming customer / tenant and the destination
      SaaS provider; allocate the plan fee across active connections for showback.
  - name: Optimization
    description: Decommission stale connections; promote prototypes from Start to Launch only when
      they cross the 5-connection ceiling; consolidate to Custom when whitelabeling or unlimited
      connections is required to avoid per-tenant escalations.
  - name: Accountability
    description: The integrating product team owns the Vessel plan and connection lifecycle; finance
      reconciles the monthly subscription against the contracted Launch / Custom rate.
maintainers:
